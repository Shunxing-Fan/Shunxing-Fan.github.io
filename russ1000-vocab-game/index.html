<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Russian vocabulary and phrase memorization game with offline MP3 audio.">
    <title>RUSS1000 Vocabulary Game</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23b51d2a'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-size='40' fill='white' font-family='Arial, sans-serif'%3E%D0%A3%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-surface" aria-labelledby="pageTitle">
        <header class="game-header">
          <div>
            <p class="eyebrow">RUSS1000 · Vocabulary</p>
            <h1 id="pageTitle">俄语单词和短语背诵</h1>
          </div>
          <div class="audio-controls" id="tts">
            <label>
              <span>Audio</span>
              <select id="audioVariant" aria-label="Audio speed">
                <option value="normal">Normal</option>
                <option value="slow">Slow</option>
              </select>
            </label>
            <button class="utility-button" id="downloadAudioPack" type="button">下载离线语音包</button>
            <button class="icon-button" id="stopSpeech" type="button" aria-label="Stop audio" title="Stop audio">■</button>
          </div>
        </header>

        <section class="setup-panel" id="setupPanel">
          <div class="setup-top">
            <div>
              <p class="eyebrow">Pick a set</p>
              <h2>选择这次要背的词</h2>
            </div>
            <div class="selection-actions">
              <span id="selectedCount">0 selected</span>
              <button class="utility-button" id="selectAll" type="button">全选</button>
              <button class="utility-button" id="clearAll" type="button">清空</button>
            </div>
          </div>

          <div class="mode-tabs" id="modeTabs" role="tablist" aria-label="Game mode">
            <button class="is-active" type="button" data-mode="audio-en">听俄语选英文</button>
            <button type="button" data-mode="en-ru">看英文选俄语</button>
          </div>

          <div class="word-list" id="wordList"></div>
          <button class="start-button" id="startGame" type="button">开始游戏</button>
        </section>

        <section class="game-panel" id="gamePanel" hidden>
          <div class="progress-line">
            <span id="modeLabel">听俄语，选英文</span>
            <span id="progressText">1 / 15</span>
          </div>

          <div class="prompt-card" id="promptArea"></div>
          <div class="feedback" id="feedback" aria-live="polite">Choose an answer</div>
          <div class="options-grid" id="optionsGrid"></div>

          <div class="game-actions">
            <button class="utility-button" id="restartButton" type="button">重新选择词表</button>
            <button class="next-button" id="nextButton" type="button" hidden>下一题</button>
          </div>
        </section>

        <section class="result-panel" id="resultPanel" hidden>
          <div>
            <p class="eyebrow">Result</p>
            <h2>本轮结果</h2>
          </div>
          <div class="result-stats" id="resultStats"></div>
          <div class="mistake-list" id="mistakeList"></div>
          <div class="result-actions">
            <button class="next-button" id="repeatRound" type="button">按本次词表再来一轮</button>
            <button class="utility-button" id="backToSetup" type="button">回到选择单词</button>
          </div>
        </section>

        <footer class="footer">
          <span>Voice: ru-RU-Chirp3-HD-Charon.</span>
          <span id="voiceStatus">Audio ready</span>
        </footer>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
