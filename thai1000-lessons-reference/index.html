    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); }
    button, select, input { font: inherit; }
    .app-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 40px; }
    header { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 2rem; line-height: 1.1; letter-spacing: 0; }
    .subtitle { margin: 8px 0 0; color: var(--muted); max-width: 720px; line-height: 1.5; }
    .lesson-select-wrap { display: grid; gap: 6px; min-width: 220px; }
    label { color: var(--muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
    select, .search-input { width: 100%; border: 1px solid var(--line); background: var(--surface); border-radius: 8px; color: var(--ink); padding: 10px 12px; outline: none; }
    select:focus, .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15, 107, 120, 0.14); }
    .layout { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 18px; align-items: start; }
    .lesson-nav { position: sticky; top: 16px; display: grid; gap: 8px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); box-shadow: var(--shadow); }
    .lesson-button { border: 0; border-radius: 7px; background: transparent; color: var(--ink); padding: 10px 12px; text-align: left; cursor: pointer; min-height: 42px; }
    .lesson-button:hover { background: var(--surface-alt); }
    .lesson-button.is-active { background: var(--accent); color: #fff; }
    main { min-width: 0; display: grid; gap: 16px; }
    .lesson-heading { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; padding: 18px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .lesson-heading h2 { margin: 0; font-size: 1.35rem; letter-spacing: 0; }
    .counts { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .count-pill { padding: 6px 9px; border-radius: 999px; background: var(--surface-alt); color: var(--muted); font-size: 0.86rem; white-space: nowrap; }
    .section-card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); }
    .section-header { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); background: #fbfcfd; }
    .section-header h3 { margin: 0; font-size: 1.05rem; letter-spacing: 0; }
    .section-body { padding: 16px 18px 18px; }
    .table-wrap { width: 100%; overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 560px; background: var(--surface); }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; line-height: 1.45; }
    th { background: var(--surface-alt); color: #3a4b59; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0; }
    tr:last-child td { border-bottom: 0; }
    .roman { font-weight: 700; color: var(--accent-strong); }
    .tip-list { display: grid; gap: 12px; }
    .tip-block, .conversation-block { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
    .tip-title, .conversation-title { margin: 0; padding: 12px 14px; background: var(--surface-alt); color: var(--ink); font-size: 0.98rem; }
    .conversation-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .tip-content { padding: 12px 14px 14px; display: grid; gap: 10px; }
    .tip-content p { margin: 0; color: #334554; line-height: 1.55; }
    .example-grid { display: grid; gap: 8px; }
    .example-row, .dialogue-line { display: grid; grid-template-columns: minmax(180px, 0.9fr) minmax(0, 1.1fr); gap: 12px; padding: 10px 0; border-top: 1px solid var(--line); line-height: 1.45; }
    .example-row:first-child, .dialogue-line:first-child { border-top: 0; }
    .conversation-list { display: grid; gap: 12px; }
    .conversation-lines { padding: 4px 14px; }
    .speaker { display: inline-block; min-width: 86px; margin-right: 8px; color: var(--amber); font-weight: 800; }
    .line-roman, .line-english { min-width: 0; }
    .line-english { color: #334554; }
    .conversation-toolbar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .audio-variant { width: auto; min-width: 108px; min-height: 34px; padding: 6px 28px 6px 10px; background-color: #fff; }
    .audio-button { display: inline-grid; place-items: center; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--accent-strong); cursor: pointer; font-weight: 800; }
    .audio-button:hover { border-color: var(--accent); background: var(--surface-alt); }
    .audio-button:disabled { cursor: not-allowed; opacity: 0.5; }
    .play-conversation, .stop-audio { width: 34px; height: 34px; flex: 0 0 auto; }
    .stop-audio { color: #7c3434; }
    .dialogue-line { grid-template-columns: 34px minmax(170px, 0.9fr) minmax(0, 1.1fr); align-items: start; }
    .line-play { width: 30px; height: 30px; margin-top: 1px; }
    .dialogue-line.is-playing { background: rgba(15, 107, 120, 0.06); margin-left: -8px; margin-right: -8px; padding-left: 8px; padding-right: 8px; border-radius: 8px; }
    .audio-status { margin: 0 0 10px; color: var(--muted); font-size: 0.9rem; line-height: 1.45; }
    .empty-state { padding: 18px; color: var(--muted); background: var(--surface-alt); border-radius: 8px; }
    .top-actions { display: flex; align-items: end; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .search-box { width: min(420px, 100%); display: grid; gap: 6px; }
    @media (max-width: 840px) { .app-shell { width: min(100% - 20px, 1180px); padding-top: 18px; } header, .layout, .lesson-heading, .section-header { grid-template-columns: 1fr; } .lesson-select-wrap { min-width: 0; } .lesson-nav { position: static; grid-template-columns: repeat(3, minmax(0, 1fr)); } .lesson-button { text-align: center; padding: 9px 6px; } .counts, .conversation-toolbar { justify-content: flex-start; } .example-row { grid-template-columns: 1fr; gap: 4px; } .dialogue-line { grid-template-columns: 34px minmax(0, 1fr); gap: 4px 10px; } .line-english { grid-column: 2; } table { min-width: 480px; } }
    @media (max-width: 520px) { h1 { font-size: 1.55rem; } .section-body, .section-header, .lesson-heading { padding-left: 12px; padding-right: 12px; } .lesson-nav { grid-template-columns: repeat(2, minmax(0, 1fr)); } table { min-width: 420px; } th, td { padding: 10px; } }
  </style>
