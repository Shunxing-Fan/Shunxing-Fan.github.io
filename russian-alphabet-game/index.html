<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Russian alphabet to Latin transcription practice game.">
    <title>Russian Alphabet Game</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23243657'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-size='39' fill='white' font-family='Arial, sans-serif'%3E%D0%96%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-surface" aria-labelledby="pageTitle">
        <header class="game-header">
          <div>
            <p class="eyebrow">Russian Alphabet</p>
            <h1 id="pageTitle">俄文字母对应游戏</h1>
          </div>
          <div class="score-strip" aria-live="polite">
            <div>
              <span>正确</span>
              <strong id="correctCount">0</strong>
            </div>
            <div>
              <span>总数</span>
              <strong id="totalCount">0</strong>
            </div>
            <div>
              <span>正确率</span>
              <strong id="accuracyText">0%</strong>
            </div>
          </div>
        </header>

        <div class="workspace">
          <aside class="panel mode-panel">
            <div class="mode-tabs" id="modeTabs" role="tablist" aria-label="Mode">
              <button class="is-active" type="button" data-mode="casual">Casual</button>
              <button type="button" data-mode="loop">Loop</button>
              <button type="button" data-mode="group">按组</button>
            </div>
            <div class="group-list" id="groupList" hidden></div>
            <button class="reset-button" id="restartButton" type="button">重新开始</button>
          </aside>

          <section class="panel question-panel">
            <div class="progress-line">
              <span id="modeLabel">Casual · 随机</span>
              <span id="progressText">∞</span>
            </div>
            <div class="letter-card">
              <div class="question-letter" id="questionLetter">А</div>
              <div class="question-group" id="questionGroup" hidden></div>
            </div>
            <div class="feedback" id="feedback" aria-live="polite">Ready</div>
            <div class="options-grid" id="optionsGrid"></div>
            <button class="next-button" id="nextButton" type="button" hidden>下一题</button>
          </section>
        </div>

        <section class="result-panel" id="resultPanel" hidden>
          <div>
            <p class="eyebrow">Result</p>
            <h2 id="resultTitle">本轮结果</h2>
          </div>
          <div class="result-stats" id="resultStats"></div>
          <div class="mistake-list" id="mistakeList"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
